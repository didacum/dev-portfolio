# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: Python, Reflex (0.8.28.post1)
  Architecture: Based on reusable components (components/) and modular views (views/). assets/data/data.json is the source of truth.
  Testing: No automated tests found. Visual verification and manual QA are required.
  Style: PEP 8, SOLID, GRASP. Conventional Commits and Gitflow.

strict_tdd: false

testing:
  runner:
    command: null
    framework: null
  layers:
    unit:
      available: false
      tool: null
    integration:
      available: false
      tool: null
    e2e:
      available: false
      tool: null
  coverage:
    available: false
    command: null
  quality:
    linter:
      available: false
      command: null
    type_checker:
      available: false
      command: null
    formatter:
      available: false
      command: null

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack
    - Create atomic commits for each task
  verify:
    - Visual verification of responsiveness
    - Validate data integrity in data.json
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)
